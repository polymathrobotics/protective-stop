---
version: 2
updates:
  # Keep GitHub Actions (checkout, esp-idf-ci-action, setup-python, ...)
  # up to date. Minor/patch bumps are grouped into a single weekly PR.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # NOTE: no `pip` ecosystem is enabled. The Python test tools in tools/
  # use only the standard library, and there is no tracked requirements.txt
  # (firmware/managed_components/ is gitignored). Add a `pip` block here if
  # a real dependency file is introduced.
