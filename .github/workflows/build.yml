---
name: ROS2 Build and Test

# NOTE: This workflow covers the ARCHIVED/DEPRECATED ROS2 packages, which
# moved to archive/ during the firmware-monorepo restructure. The paths
# below were updated to their archived locations so the triggers still
# resolve to real files rather than silently never matching. These
# packages are not built as part of the active firmware product; see
# archive/README.md.

# Manual-only: these packages are archived/deprecated and pending removal, so
# this workflow no longer gates pushes or PRs. Run it on demand from the
# Actions tab if the archived ROS2 packages ever need a build.
on:
  workflow_dispatch:

jobs:
  build_and_test_ros2:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rosdistro: humble
            ubuntu: jammy
          - rosdistro: jazzy
            ubuntu: noble
    container:
      image: rostooling/setup-ros-docker:ubuntu-${{ matrix.ubuntu }}-latest
    steps:
      - name: Build and run tests
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          target-ros2-distro: ${{ matrix.rosdistro }}
