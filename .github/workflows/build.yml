---
name: ROS2 Build and Test

on:
  push:
    branches: [main]
    paths:
      - protective_stop_msg/**
      - protective_stop_node/**
      - .github/workflows/build.yml
  pull_request:
    paths:
      - protective_stop_msg/**
      - protective_stop_node/**
      - .github/workflows/build.yml

jobs:
  build_and_test_ros2:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rosdistro: humble
            ubuntu: jammy
          - rosdistro: jazzy
            ubuntu: noble
    container:
      image: rostooling/setup-ros-docker:ubuntu-${{ matrix.ubuntu }}-latest
    steps:
      - name: Build and run tests
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          target-ros2-distro: ${{ matrix.rosdistro }}
