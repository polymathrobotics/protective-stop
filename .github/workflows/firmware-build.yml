---
name: Firmware build (ESP-IDF)

# Builds pstop_remote.bin for the ESP32-S3 remote using ESP-IDF v5.5.
# Runs whenever the firmware, its shared components, or the certified
# pstop_c library change.

on:
  push:
    branches: [main]
    paths:
      - firmware/**
      - components/**
      - pstop_c/**
      - .github/workflows/firmware-build.yml
  pull_request:
    paths:
      - firmware/**
      - components/**
      - pstop_c/**
      - .github/workflows/firmware-build.yml

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      # The build reads firmware/sdkconfig.credentials, which is
      # gitignored (secrets). CI has no secrets, so seed it from the
      # example if present, otherwise create an empty file so the build
      # doesn't fail on a missing include.
      - name: Seed sdkconfig.credentials
        run: |
          if [ -f firmware/sdkconfig.credentials.example ]; then
            cp firmware/sdkconfig.credentials.example firmware/sdkconfig.credentials
          else
            touch firmware/sdkconfig.credentials
          fi

      - name: Build with ESP-IDF v5.5
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: esp32s3
          path: firmware
