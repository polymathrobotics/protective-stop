---
name: pstop_c coverage

on:
  push:
    branches: [main]
    paths:
      - pstop_c/**
      - .github/workflows/pstop_c_coverage.yml
  pull_request:
    paths:
      - pstop_c/**
      - .github/workflows/pstop_c_coverage.yml

jobs:
  bullseye_coverage:
    # Dependabot-triggered runs get no repo secrets, so the Bullseye install
    # fails on an empty BULLSEYE_LICENSE_KEY. Skip instead of failing red.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      BULLSEYE_VERSION: 9.25.2
      BULLSEYE_PREFIX: /opt/BullseyeCoverage
    steps:
      - uses: actions/checkout@v7

      - name: Install BullseyeCoverage
        env:
          BULLSEYE_LICENSE_KEY: ${{ secrets.BULLSEYE_LICENSE_KEY }}
        run: |
          set -eu
          tarball="/tmp/BullseyeCoverage-${BULLSEYE_VERSION}-Linux-x64.tar.xz"
          curl -fsSL \
            "https://www.bullseye.com/download-archive/${BULLSEYE_VERSION%.*}/BullseyeCoverage-${BULLSEYE_VERSION}-Linux-x64.tar.xz" \
            -o "${tarball}"
          # Fail loudly if we somehow fetched anything instead of an xz archive.
          xz -t "${tarball}"
          tar -xJf "${tarball}" -C /tmp
          rm -f "${tarball}"
          sudo "/tmp/BullseyeCoverage-${BULLSEYE_VERSION}/install" \
            --prefix "${BULLSEYE_PREFIX}" \
            --key "${BULLSEYE_LICENSE_KEY}" \
            --search "$PATH" \
            --quiet
          rm -rf "/tmp/BullseyeCoverage-${BULLSEYE_VERSION}"
          echo "${BULLSEYE_PREFIX}/bin" >> "${GITHUB_PATH}"

      - name: Run coverage build + HTML report
        working-directory: pstop_c
        run: |
          scripts/run-coverage.sh --html
          cd build
          COVFILE=pstop.cov covsrc -q | tee coverage-summary.txt

      - name: Publish coverage summary
        if: always()
        run: |
          summary="pstop_c/build/coverage-summary.txt"
          {
            echo '## pstop_c coverage'
            echo
            if [[ -s "${summary}" ]]; then
              echo '```'
              cat "${summary}"
              echo '```'
            else
              echo '_No coverage summary produced — see job logs._'
            fi
            echo
            echo 'Full HTML report: download the `pstop_c-coverage-html` artifact below.'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        with:
          name: pstop_c-coverage-html
          path: pstop_c/build/coverage-html
          if-no-files-found: error
